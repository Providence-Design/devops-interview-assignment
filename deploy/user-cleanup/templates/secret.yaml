{{/*
No Secret is created by this chart. `values.keycloak.existingSecret` names
a Secret this chart expects to already exist (key: values.keycloak.existingSecretKey),
provisioned out-of-band - by an ExternalSecret, sealed-secret, or `kubectl
create secret generic` for this exercise.

For a real deployment with the External Secrets Operator, the shape would
look like this (adjust secretStoreRef to whatever backend is in use):

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "user-cleanup.fullname" . }}-keycloak-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.keycloak.existingSecret }}
  data:
    - secretKey: {{ .Values.keycloak.existingSecretKey }}
      remoteRef:
        key: secret/data/user-cleanup/{{ .Values.keycloak.realm }}
        property: client-secret

Left as a template comment rather than a live resource: committing a
concrete secretStoreRef would assume a specific secrets backend this
chart shouldn't hard-couple to, and getting it wrong is worse than being
explicit that it's a deployment-specific fill-in.
*/}}